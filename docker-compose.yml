version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=8h
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - VOXIMPLANT_ACCOUNT_ID=${VOXIMPLANT_ACCOUNT_ID}
      - VOXIMPLANT_API_KEY_PATH=/app/credentials/vox_ci_credentials.json
      - VOXIMPLANT_APPLICATION_ID=${VOXIMPLANT_APPLICATION_ID}
      - VOXIMPLANT_APPLICATION_NAME=${VOXIMPLANT_APPLICATION_NAME}
      - VOXIMPLANT_ACCOUNT_NAME=${VOXIMPLANT_ACCOUNT_NAME}
      - VOXIMPLANT_DEFAULT_CALLER_ID=${VOXIMPLANT_DEFAULT_CALLER_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FRONTEND_URL=http://frontend:3000
      - DIALER_MODE=${DIALER_MODE:-preview}
      - DIALER_POLL_INTERVAL_MS=${DIALER_POLL_INTERVAL_MS:-3000}
      - AMD_ENABLED=${AMD_ENABLED:-true}
      - TCPA_WINDOW_START_HOUR=8
      - TCPA_WINDOW_END_HOUR=21
      - TCPA_DEFAULT_TIMEZONE=America/Chicago
      - REGF_MAX_CALLS_PER_DEBT=7
      - REGF_WINDOW_DAYS=7
    volumes:
      - ./vox_ci_credentials.json:/app/credentials/vox_ci_credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-VoximplantBuild}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
