name: Deploy VoxEngine Scenarios

on:
  push:
    branches: [main]
    paths:
      - 'voxfiles/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install voxengine-ci
        run: npm install @voximplant/voxengine-ci

      - name: Decode credentials
        env:
          VOX_CREDENTIALS_BASE64: ${{ secrets.VOX_CI_CREDENTIALS_BASE64 }}
        run: echo "$VOX_CREDENTIALS_BASE64" | base64 -d > vox_ci_credentials.json

      - name: Deploy scenarios
        env:
          VOX_CI_CREDENTIALS: ./vox_ci_credentials.json
          VOX_CI_ROOT_PATH: ./voxfiles
        run: |
          npx voxengine-ci upload \
            --application-name ${{ vars.VOXIMPLANT_APPLICATION_NAME }}
